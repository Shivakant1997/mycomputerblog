<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">

    <style>

            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 340px;
        }
        .profile-img {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h2 {

            color: #333; 
        }
        .tagline { 
            color: #007bff; 
            font-weight: bold;
            margin-top: 5px; 
            margin-bottom: 15px; 
        }
        .service-box {
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
            padding: 10px;
            text-align: left;
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;

        }
        .price-tag {
            font-size: 20px;
            color: #dc3545;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .btn {

            width: 90%;
            padding: 12px;
            margin: 10px auto;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            color: white;
        }
        .btn-whatsapp {

        }

                <li>दुकानदार, किराना स्टोर, व्यापारी</li>

        <div class="price-tag">

        <a href="https://wa.me/919682204065?text=नमस्ते%20शिवकांत%20जी,%20मुझे%20अपनी%20दुकान/काम%20का%20डिजिटल%20कार्ड%20बनवाना%20है।" class="btn btn-whatsapp" target="_blank">📱 WhatsApp पर ऑर्डर दें</a>
        
        <a href="tel:+919682204065" class="btn btn-call">📞 सीधे कॉल करें</a>

</html>
